<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTOBET</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #1b1e22;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            font-size: 14px;
            padding-bottom: 140px; /* Отступ для купона снизу */
        }
        .navbar {
            background-color: #2d3136;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f5fe00;
        }
        .brand {
            font-weight: bold;
            font-size: 16px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .brand span { color: #f5fe00; }
        .auth-buttons { display: flex; gap: 8px; }
        .btn {
            border: none;
            padding: 6px 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
        }
        .btn-login {
            background-color: #383d44;
            color: #fff;
            border: 1px solid #4f5660;
        }
        .btn-register {
            background-color: #e58e26;
            color: #fff;
        }
        .user-panel { display: flex; align-items: center; gap: 8px; }
        .btn-deposit {
            background-color: #85bc24;
            color: #fff;
            padding: 5px 10px;
            font-size: 11px;
        }
        .btn-withdraw {
            background-color: #383d44;
            color: #fff;
            border: 1px solid #4f5660;
            padding: 5px 10px;
            font-size: 11px;
        }
        .balance-box {
            background: #23262a;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #383d44;
            font-size: 13px;
        }
        .balance-value { color: #f5fe00; font-weight: bold; }
        .logout-btn {
            background: none; border: none; color: #ff4d4d;
            cursor: pointer; font-size: 12px; padding: 0; text-decoration: underline;
            margin-left: 4px;
        }
        
        /* Вкладки навигации */
        .tabs-nav {
            display: flex;
            background: #23262a;
            border-bottom: 1px solid #383d44;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #aaa;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            font-size: 12px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: #f5fe00;
            border-bottom: 2px solid #f5fe00;
            background: #2d3136;
        }

        /* Контент */
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }

        /* Модалки */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 1000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal {
            background: #2d3136; width: 100%; max-width: 360px;
            border-radius: 8px; overflow: hidden; border: 1px solid #383d44;
        }
        .modal-body { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 12px; }
        .form-control {
            width: 100%; background: #1b1e22; border: 1px solid #383d44;
            padding: 10px; border-radius: 4px; color: #fff;
        }
        .btn-submit { width: 100%; background: #4a90e2; color: white; padding: 10px; margin-top: 10px; }

        /* Фильтры */
        .filter-bar {
            background: #2d3136; padding: 8px 10px; border-radius: 4px;
            margin-bottom: 15px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; font-size: 12px;
        }
        .filter-title { color: #aaa; font-weight: bold; margin-right: 4px; text-transform: uppercase; }
        .filter-tag {
            background: #1b1e22; padding: 6px 10px; border-radius: 4px;
            color: #aaa; border: 1px solid #383d44; cursor: pointer; display: flex; align-items: center; gap: 5px;
            transition: all 0.2s;
        }
        .filter-tag:hover { border-color: #f5fe00; color: #fff; }
        .filter-tag.active {
            background: #23262a; border-color: #f5fe00; color: #f5fe00; font-weight: bold;
        }
        .filter-tag::before { content: "●"; color: #4f5660; font-size: 8px; }
        .filter-tag.active::before { color: #f5fe00; }

        .section-title {
            font-size: 14px; text-transform: uppercase; color: #94a3b8;
            margin-bottom: 10px; font-weight: 600; border-left: 3px solid #f5fe00; padding-left: 8px;
        }

        .matches-list { display: flex; flex-direction: column; gap: 10px; }
        .match-card { background: #2d3136; border-radius: 4px; border: 1px solid #383d44; overflow: hidden; }
        .match-meta {
            background: #23262a; padding: 6px 12px; font-size: 11px; color: #aaa;
            display: flex; justify-content: space-between;
        }
        .event-name { color: #aaa; font-weight: 500; }
        .match-main { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .team-row { display: flex; justify-content: space-between; align-items: center; }
        .team-info { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 500; }
        .team-logo-placeholder { width: 20px; height: 20px; background: #475569; border-radius: 3px; }
        
        .odds-row { display: flex; gap: 10px; margin-top: 5px; border-top: 1px solid #383d44; padding-top: 10px; }
        .odds-btn {
            flex: 1; background: #23262a; border: 1px solid #383d44; color: #fff;
            padding: 8px; border-radius: 4px; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center; font-size: 13px;
        }
        .odds-btn:hover { border-color: #f5fe00; }
        .odds-btn.active { background: #373e21; border-color: #f5fe00; }
        .odds-btn .outcome-type { color: #aaa; font-size: 11px; }
        .odds-btn .odds-val { color: #f5fe00; font-weight: bold; }

        /* Купон */
        .bet-slip-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #23262a; border-top: 2px solid #383d44;
            z-index: 999; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        .slip-header {
            background: #2d3136; padding: 10px 15px; display: flex;
            justify-content: space-between; align-items: center; cursor: pointer;
            border-bottom: 1px solid #383d44;
        }
        .slip-title { font-weight: bold; display: flex; gap: 8px; align-items: center; }
        .slip-badge { background: #f5fe00; color: #000; padding: 2px 6px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .slip-body { display: none; padding: 15px; max-height: 300px; overflow-y: auto; }
        .slip-body.open { display: block; }
        
        .slip-item {
            background: #1b1e22; padding: 8px 10px; border-radius: 4px;
            margin-bottom: 8px; border-left: 3px solid #f5fe00;
            display: flex; justify-content: space-between; align-items: center;
        }
        .slip-item-details { flex: 1; }
        .slip-item-teams { font-size: 12px; color: #aaa; }
        .slip-item-bet { font-weight: bold; margin-top: 2px; }
        .slip-item-delete { background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 16px; }

        .slip-summary { background: #2d3136; padding: 12px; border-radius: 4px; margin-top: 10px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
        .slip-input-group { display: flex; gap: 10px; margin-top: 10px; }
        .slip-input {
            flex: 1; background: #1b1e22; border: 1px solid #4f5660;
            padding: 8px; border-radius: 4px; color: #fff; font-weight: bold; text-align: center;
        }
        .btn-bet-submit {
            background: #f5fe00; color: #000; font-weight: bold;
            padding: 10px 20px; border-radius: 4px; border: none; cursor: pointer;
            text-transform: uppercase; font-size: 13px;
        }
        .btn-bet-submit:disabled { background: #4f5660; color: #888; cursor: not-allowed; }

        /* Профиль */
        .profile-card {
            background: #2d3136; padding: 15px; border-radius: 6px;
            border: 1px solid #383d44; margin-bottom: 20px;
        }
        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-item {
            background: #2d3136; border: 1px solid #383d44; border-radius: 6px; overflow: hidden;
        }
        .history-item-header {
            background: #23262a; padding: 8px 12px; font-size: 12px;
            display: flex; justify-content: space-between; color: #aaa; border-bottom: 1px solid #383d44;
        }
        .history-item-body { padding: 12px; }
        .history-sub-match {
            border-left: 2px solid #f5fe00; padding-left: 8px; margin-bottom: 8px; font-size: 13px;
        }
        .history-sub-match:last-child { margin-bottom: 0; }
        .history-sub-title { color: #aaa; font-size: 11px; }
        .history-item-footer {
            background: #23262a; padding: 10px 12px; font-size: 13px;
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid #383d44;
        }
        .status-badge {
            background: #e58e26; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">CRYPTO<span>BET</span></div>
        <div class="auth-buttons" id="auth-guest">
            <button class="btn btn-login" onclick="openModal('login-modal')">Вход</button>
            <button class="btn btn-register" onclick="openModal('register-modal')">Рега</button>
        </div>
        <div class="user-panel" id="auth-user" style="display: none;">
            <button class="btn btn-deposit" onclick="actionDeposit()">Пополнить</button>
            <button class="btn btn-withdraw" onclick="actionWithdraw()">Вывести</button>
            <div class="balance-box"><span class="balance-value" id="user-balance">0 COIN</span></div>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" id="tab-line-btn" onclick="switchTab('line')">Линия</button>
        <button class="tab-btn" id="tab-profile-btn" onclick="switchTab('profile')">Мои пари</button>
    </div>

    <!-- ЛИНИЯ -->
    <div id="tab-line" class="tab-content active">
        <div class="filter-bar">
            <div class="filter-title">ЛИНИИ:</div>
            <div class="filter-tag active" id="filter-cs2" onclick="setSportFilter('cs2')">CS2</div>
            <div class="filter-tag" id="filter-dota2" onclick="setSportFilter('dota2')">Dota 2</div>
            <div class="filter-tag" id="filter-football" onclick="setSportFilter('football')">Football</div>
            <div class="filter-tag" id="filter-basketball" onclick="setSportFilter('basketball')">Basketball</div>
            <div class="filter-tag" id="filter-tennis" onclick="setSportFilter('tennis')">Tennis</div>
        </div>
        <div class="section-title" id="current-sport-title">CS2 Линия</div>
        <div class="matches-list" id="matches-container">
            <div style='padding:20px;text-align:center;color:#aaa;'>Загрузка...</div>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="tab-profile" class="tab-content">
        <div class="section-title">Личный кабинет</div>
        <div id="profile-unauth" style="text-align: center; padding: 4px 0; color: #aaa;">
            <p>Войдите в аккаунт для просмотра истории пари.</p>
            <button class="btn btn-register" onclick="openModal('login-modal')">Войти</button>
        </div>
        <div id="profile-auth" style="display: none;">
            <div class="profile-card">
                <div style="font-weight: bold; font-size: 16px; margin-bottom: 5px;" id="profile-email"></div>
                <div style="color: #aaa;">Статус аккаунта: <span style="color:#85bc24; font-weight: bold;">Подтвержден</span></div>
            </div>
            <div class="section-title">История Ваших пари</div>
            <div class="history-list" id="history-container"></div>
        </div>
    </div>

    <!-- КУПОН -->
    <div class="bet-slip-panel" id="bet-slip">
        <div class="slip-header" onclick="toggleSlip()">
            <div class="slip-title">Купон пари <span class="slip-badge" id="slip-count">0</span></div>
            <div id="slip-type-text" style="color: #f5fe00; font-weight: bold; font-size: 12px;">Ординар</div>
        </div>
        <div class="slip-body" id="slip-body">
            <div id="slip-items-container"></div>
            <div class="slip-summary">
                <div class="summary-row"><span>Тип пари:</span><strong id="summary-type">Ординар</strong></div>
                <div class="summary-row"><span>Общий коэффициент:</span><strong style="color: #f5fe00;" id="summary-odds">0.00</strong></div>
                <div class="summary-row"><span>Возможный выигрыш:</span><strong style="color: #85bc24;" id="summary-win">0 COIN</strong></div>
                <div class="slip-input-group">
                    <input type="number" id="bet-amount" class="slip-input" placeholder="Сумма" value="100" oninput="calculateSlip()">
                    <button class="btn-bet-submit" id="place-bet-btn" onclick="submitBetSlip()" disabled>Заключить пари</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалки -->
    <div class="modal-overlay" id="login-modal">
        <div class="modal"><div class="modal-body"><form onsubmit="handleLogin(event)"><div class="form-group"><label>Email</label><input type="email" id="login-email" class="form-control" required></div><div class="form-group"><label>Пароль</label><input type="password" id="login-password" class="form-control" required></div><button type="submit" class="btn-submit">Войти</button><button type="button" class="btn-submit" style="background:#4f5660; margin-top:5px;" onclick="closeModal('login-modal')">Закрыть</button></form></div></div>
    </div>
    <div class="modal-overlay" id="register-modal">
        <div class="modal"><div class="modal-body"><form onsubmit="handleRegister(event)"><div class="form-group"><label>Email</label><input type="email" id="reg-email" class="form-control" required></div><div class="form-group"><label>Пароль</label><input type="password" id="reg-password" class="form-control" required minlength="6"></div><button type="submit" class="btn-submit" style="background-color: #85bc24;">Регистрация</button><button type="button" class="btn-submit" style="background:#4f5660; margin-top:5px;" onclick="closeModal('register-modal')">Закрыть</button></form></div></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        const DB = {
            getUsers: () => JSON.parse(localStorage.getItem('users')) || {},
            saveUser: (email, password) => {
                const users = DB.getUsers();
                if (users[email]) return false;
                users[email] = { password: password, balance: 5000, history: [] };
                localStorage.setItem('users', JSON.stringify(users));
                return true;
            },
            checkUser: (email, password) => {
                const users = DB.getUsers();
                return users[email] && users[email].password === password ? users[email] : null;
            },
            saveBet: (email, betData) => {
                const users = DB.getUsers();
                if(users[email]) {
                    if(!users[email].history) users[email].history = [];
                    users[email].history.unshift(betData);
                    localStorage.setItem('users', JSON.stringify(users));
                }
            }
        };

        let currentUser = JSON.parse(sessionStorage.getItem('session_user')) || null;
        let basket = []; 
        let currentSport = 'cs2';

        // УНИКАЛЬНЫЕ НАБОРЫ МАТЧЕЙ ДЛЯ КАЖДОЙ ВЫБРАННОЙ КАТЕГОРИИ
        const sportsFallbackData = {
            cs2: [
                { id: 101, team1: "Natus Vincere", team2: "G2 Esports", event: "PGL Major 2026", time: "LIVE", odd1: 1.65, odd2: 2.25 },
                { id: 102, team1: "Team Spirit", team2: "FaZe Clan", event: "IEM Katowice", time: "Сегодня, 19:00", odd1: 1.45, odd2: 2.80 },
                { id: 103, team1: "Team Vitality", team2: "MOUZ", event: "ESL Pro League", time: "Завтра, 16:30", odd1: 1.52, odd2: 2.50 }
            ],
            dota2: [
                { id: 201, team1: "BetBoom Team", team2: "Team Liquid", event: "Riyadh Masters", time: "LIVE", odd1: 1.95, odd2: 1.85 },
                { id: 202, team1: "Xtreme Gaming", team2: "Falcons", event: "The International 2026", time: "Сегодня, 21:00", odd1: 2.40, odd2: 1.57 },
                { id: 203, team1: "Tundra Esports", team2: "Gaimin Gladiators", event: "DreamLeague", time: "Сегодня, 23:45", odd1: 2.10, odd2: 1.72 }
            ],
            football: [
                { id: 301, team1: "Real Madrid", team2: "Barcelona", event: "Испания. Ла Лига", time: "LIVE", odd1: 2.15, oddX: 3.65, odd2: 3.10 },
                { id: 302, team1: "Manchester City", team2: "Liverpool", event: "Англия. Премьер-Лига", time: "Сегодня, 22:45", odd1: 1.90, oddX: 3.80, odd2: 3.90 },
                { id: 303, team1: "Bayern Munich", team2: "PSG", event: "Лига Чемпионов УЕФА", time: "Завтра, 22:00", odd1: 1.75, oddX: 4.00, odd2: 4.50 }
            ],
            basketball: [
                { id: 401, team1: "Boston Celtics", team2: "Dallas Mavericks", event: "США. NBA", time: "Завтра, 03:30", odd1: 1.42, oddX: 15.0, odd2: 2.95 },
                { id: 402, team1: "Los Angeles Lakers", team2: "Golden State Warriors", event: "США. NBA", time: "Завтра, 06:00", odd1: 1.85, oddX: 14.0, odd2: 1.95 },
                { id: 403, team1: "Olympiacos", team2: "Panathinaikos", event: "Евролига", time: "Сегодня, 21:15", odd1: 1.60, oddX: 14.5, odd2: 2.40 }
            ],
            tennis: [
                { id: 501, team1: "Alcaraz C.", team2: "Sinner J.", event: "ATP. Ролан Гаррос", time: "LIVE", odd1: 1.82, odd2: 1.98 },
                { id: 502, team1: "Djokovic N.", team2: "Medvedev D.", event: "ATP. Уимблдон", time: "Сегодня, 17:15", odd1: 1.40, odd2: 3.00 },
                { id: 503, team1: "Swiatek I.", team2: "Sabalenka A.", event: "WTA. Финал", time: "Завтра, 15:00", odd1: 1.55, odd2: 2.48 }
            ]
        };

        const API_URL = "http://localhost:8000/api/matches"; 

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if(tabName === 'line') {
                document.getElementById('tab-line-btn').classList.add('active');
                document.getElementById('tab-line').classList.add('active');
                document.getElementById('bet-slip').style.display = 'block';
            } else {
                document.getElementById('tab-profile-btn').classList.add('active');
                document.getElementById('tab-profile').classList.add('active');
                document.getElementById('bet-slip').style.display = 'none';
                renderHistory();
            }
        }

        function setSportFilter(sportCode) {
            currentSport = sportCode;
            document.querySelectorAll('.filter-tag').forEach(tag => tag.classList.remove('active'));
            document.getElementById(`filter-${sportCode}`).classList.add('active');
            
            const titles = { cs2: 'CS2 Линия', dota2: 'Dota 2 Линия', football: 'Футбольная линия', basketball: 'Баскетбольная линия', tennis: 'Теннисная линия' };
            document.getElementById('current-sport-title').innerText = titles[sportCode] || 'Матчи из линии';
            loadActualMatches(false);
        }

        function updateUI() {
            if (currentUser) {
                document.getElementById('auth-guest').style.display = 'none';
                document.getElementById('auth-user').style.display = 'flex';
                document.getElementById('profile-unauth').style.display = 'none';
                document.getElementById('profile-auth').style.display = 'block';
                document.getElementById('profile-email').innerText = currentUser.email;
                const users = DB.getUsers();
                document.getElementById('user-balance').innerText = (users[currentUser.email]?.balance || 0).toLocaleString() + ' COIN';
            } else {
                document.getElementById('auth-guest').style.display = 'flex';
                document.getElementById('auth-user').style.display = 'none';
                document.getElementById('profile-unauth').style.display = 'block';
                document.getElementById('profile-auth').style.display = 'none';
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function handleRegister(e) { 
            e.preventDefault(); 
            if(DB.saveUser(document.getElementById('reg-email').value, document.getElementById('reg-password').value)){ 
                alert('Успешно!'); closeModal('register-modal'); openModal('login-modal'); 
            } else { alert('Почта занята!'); } 
        }
        
        function handleLogin(e) { 
            e.preventDefault(); 
            if(DB.checkUser(document.getElementById('login-email').value, document.getElementById('login-password').value)){ 
                currentUser={email:document.getElementById('login-email').value}; 
                sessionStorage.setItem('session_user', JSON.stringify(currentUser)); 
                closeModal('login-modal'); updateUI(); renderHistory();
            } else { alert('Ошибка входа!'); } 
        }
        
        function logout() { currentUser = null; sessionStorage.removeItem('session_user'); updateUI(); renderHistory(); }
        function actionDeposit() { alert('Окно пополнения в разработке.'); }
        function actionWithdraw() { alert('Окно вывода в разработке.'); }

        function displayMatches(matches) {
            const container = document.getElementById('matches-container');
            if(matches.length === 0) {
                container.innerHTML = `<div style='padding:20px;text-align:center;color:#aaa;'>Нет доступных событий.</div>`;
                return;
            }

            container.innerHTML = matches.map(m => {
                const activeBet = basket.find(b => b.matchId === m.id);
                
                // Рендер кнопок под разные форматы (с ничьей Х или без неё)
                let oddsHTML = `
                    <button class="odds-btn ${activeBet && activeBet.outcome === '1' ? 'active' : ''}" onclick="addToSlip(${m.id}, '${m.team1} - ${m.team2}', '${m.team1}', ${m.odd1}, '1')">
                        <span class="outcome-type">Поб. 1</span><span class="odds-val">${m.odd1}</span>
                    </button>
                `;

                if (m.oddX) {
                    oddsHTML += `
                        <button class="odds-btn ${activeBet && activeBet.outcome === 'X' ? 'active' : ''}" onclick="addToSlip(${m.id}, '${m.team1} - ${m.team2}', 'Ничья', ${m.oddX}, 'X')">
                            <span class="outcome-type">Ничья X</span><span class="odds-val">${m.oddX}</span>
                        </button>
                    `;
                }

                oddsHTML += `
                    <button class="odds-btn ${activeBet && activeBet.outcome === '2' ? 'active' : ''}" onclick="addToSlip(${m.id}, '${m.team1} - ${m.team2}', '${m.team2}', ${m.odd2}, '2')">
                        <span class="outcome-type">Поб. 2</span><span class="odds-val">${m.odd2}</span>
                    </button>
                `;

                return `
                <div class="match-card">
                    <div class="match-meta">
                        <span class="event-name">${m.event}</span>
                        <span style="color: ${m.time === 'LIVE' ? '#f5fe00' : '#aaa'}; font-weight: bold;">${m.time}</span>
                    </div>
                    <div class="match-main">
                        <div class="team-row"><div class="team-info"><span class="team-logo-placeholder"></span> ${m.team1}</div></div>
                        <div class="team-row" style="margin-top: 5px;"><div class="team-info"><span class="team-logo-placeholder"></span> ${m.team2}</div></div>
                        <div class="odds-row">${oddsHTML}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function addToSlip(matchId, matchName, teamName, odds, outcome) {
            basket = basket.filter(item => item.matchId !== matchId);
            basket.push({ matchId, matchName, teamName, odds, outcome });
            if(basket.length === 1) document.getElementById('slip-body').classList.add('open');
            renderSlip();
            loadActualMatches(false); 
        }

        function removeFromSlip(matchId) {
            basket = basket.filter(item => item.matchId !== matchId);
            renderSlip();
            loadActualMatches(false);
        }

        function toggleSlip() { document.getElementById('slip-body').classList.toggle('open'); }

        function renderSlip() {
            document.getElementById('slip-count').innerText = basket.length;
            const typeText = basket.length > 1 ? `Экспресс (${basket.length})` : 'Ординар';
            document.getElementById('slip-type-text').innerText = typeText;
            document.getElementById('summary-type').innerText = typeText;

            const container = document.getElementById('slip-items-container');
            if(basket.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:#aaa; padding:10px;">Купон пуст. Измените фильтр или выберите исход.</div>`;
                document.getElementById('place-bet-btn').disabled = true;
                calculateSlip();
                return;
            }

            container.innerHTML = basket.map(item => `
                <div class="slip-item">
                    <div class="slip-item-details">
                        <div class="slip-item-teams">${item.matchName}</div>
                        <div class="slip-item-bet">Выбор: ${item.teamName} <span style="color:#f5fe00;margin-left:5px;">Кэф: ${item.odds}</span></div>
                    </div>
                    <button class="slip-item-delete" onclick="removeFromSlip(${item.matchId})">&times;</button>
                </div>
            `).join('');

            document.getElementById('place-bet-btn').disabled = false;
            calculateSlip();
        }

        function calculateSlip() {
            if(basket.length === 0) {
                document.getElementById('summary-odds').innerText = '0.00';
                document.getElementById('summary-win').innerText = '0 COIN';
                return;
            }
            let totalOdds = 1;
            basket.forEach(item => totalOdds *= item.odds);
            const amount = parseFloat(document.getElementById('bet-amount').value) || 0;
            document.getElementById('summary-odds').innerText = totalOdds.toFixed(2);
            document.getElementById('summary-win').innerText = Math.floor(amount * totalOdds).toLocaleString() + ' COIN';
        }

        function submitBetSlip() {
            if (!currentUser) { alert('Войдите в систему!'); return; }
            const amount = parseFloat(document.getElementById('bet-amount').value) || 0;
            if(amount < 10) { alert('Мин. сумма пари — 10 COIN'); return; }

            const users = DB.getUsers();
            if (users[currentUser.email].balance < amount) { alert('Недостаточно коинов!'); return; }

            let totalOdds = 1;
            basket.forEach(item => totalOdds *= item.odds);
            
            const newBet = {
                type: basket.length > 1 ? 'Экспресс' : 'Ординар',
                date: new Date().toLocaleString(),
                amount: amount,
                totalOdds: totalOdds.toFixed(2),
                items: [...basket]
            };

            users[currentUser.email].balance -= amount;
            localStorage.setItem('users', JSON.stringify(users));
            DB.saveBet(currentUser.email, newBet);

            alert('Пари успешно принято!');
            basket = [];
            renderSlip(); updateUI(); loadActualMatches(false);
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            if (!currentUser) { container.innerHTML = ''; return; }
            const history = DB.getUsers()[currentUser.email]?.history || [];

            if (history.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:#aaa; padding:20px;">История пуста</div>`;
                return;
            }
            container.innerHTML = history.map(bet => `
                <div class="history-item">
                    <div class="history-item-header"><span>${bet.type}</span><span>${bet.date}</span></div>
                    <div class="history-item-body">
                        ${bet.items.map(i => `<div class="history-sub-match"><div class="history-sub-title">${i.matchName}</div><div>Выбор: <strong>${i.teamName}</strong> (${i.odds})</div></div>`).join('')}
                    </div>
                    <div class="history-item-footer"><div>Сумма: <strong>${bet.amount}</strong> @ <span style="color:#f5fe00;">${bet.totalOdds}</span></div><span class="status-badge">В игре</span></div>
                </div>
            `).join('');
        }

        async function loadActualMatches(initial = true) {
            try {
                const response = await fetch(`${API_URL}?sport=${currentSport}`);
                if (!response.ok) throw new Error();
                displayMatches(await response.json());
            } catch (error) {
                displayMatches(sportsFallbackData[currentSport] || []);
            }
            if(initial) renderSlip();
        }

        loadActualMatches(true);
        updateUI();
        setInterval(() => loadActualMatches(false), 30000);
    </script>
</body>
</html>
